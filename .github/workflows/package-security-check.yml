name: Package Security Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security
    runs-on: ["self-hosted", "linux", "superoptimizers", "security"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Audit package dependencies
        run: |
          echo "Running npm audit --audit-level=high..."
          npm audit --audit-level=high
