<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 26px 32px; box-sizing: border-box; }
  .head { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-soft); margin: 0 0 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center;
    border-radius: 9999px;
    padding: 5px 12px;
    font: 600 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid;
  }
  .b-status   { background: rgba(14,45,92,0.06); color: #0e2d5c; border-color: rgba(14,45,92,0.18); }
  .b-live     { background: #0e2d5c; color: #fbf6ee; border-color: transparent; }
  .b-progress { background: #fefbf5; color: var(--fg); border-color: var(--border-strong); border-style: dashed; }
  .b-warn     { background: rgba(185,52,31,0.08); color: #b9341f; border-color: rgba(185,52,31,0.25); }
  .b-tag      { background: #f1ebde; color: var(--fg-soft); border-color: transparent; text-transform: none; letter-spacing: 0.02em; font-weight: 500; font-size: 12px; }
  .note { font-family: var(--font-sans); font-size: 12px; color: var(--fg-soft); margin-top: 14px; }
</style>
</head>
<body>
  <p class="head">Badges</p>
  <div class="row">
    <span class="badge b-status">Pilot</span>
    <span class="badge b-live">Live</span>
    <span class="badge b-progress">In progress</span>
    <span class="badge b-warn">Refund</span>
    <span class="badge b-tag">5-day build</span>
    <span class="badge b-tag">free</span>
  </div>
  <p class="note">Pill, uppercase, wide tracking. Used for status (Live, In progress) and meta (5-day build).</p>
</body>
</html>
