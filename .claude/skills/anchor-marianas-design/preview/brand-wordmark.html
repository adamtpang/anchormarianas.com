<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 28px 32px; box-sizing: border-box; }
  .wordmark { font-family: var(--font-display); font-size: 56px; line-height: 1; letter-spacing: -0.015em; }
  .tag { display: inline-flex; align-items: center; gap: 10px; margin-top: 16px; }
  .tag .t { font-family: var(--font-sans); font-size: 18px; color: var(--fg); font-weight: 500; }
  .sonar { width: 8px; height: 8px; }
  .meta { margin-top: 18px; display: flex; gap: 20px; align-items: center; }
  .meta .t-eyebrow { color: var(--fg-soft); }
  .meta .t-coord { color: var(--fg-soft); }
</style>
</head>
<body>
  <div class="wordmark">Anchor Marianas</div>
  <div class="tag">
    <span class="sonar"><span></span></span>
    <span class="t">we ship.</span>
  </div>
  <div class="meta">
    <span class="t-eyebrow">Wordmark · Instrument Serif 400</span>
    <span class="t-coord">tagline · Inter 500 · lowercase, period included</span>
  </div>
</body>
</html>
