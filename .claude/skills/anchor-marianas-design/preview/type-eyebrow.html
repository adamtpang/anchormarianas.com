<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 26px 32px; box-sizing: border-box; }
  .row { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .eb { font-family: var(--font-sans); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--fg-soft); }
  .h { font-family: var(--font-sans); font-weight: 600; font-size: 24px; letter-spacing: -0.02em; line-height: 1.15; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-soft); }
</style>
</head>
<body>
  <div class="row">
    <span class="eb">Anchor Marianas</span>
    <span class="h">We sit, find the knot, then ship the cure.</span>
    <span class="meta">eyebrow → hero pattern · spacing-3 between · used at the top of every section</span>
  </div>
  <div class="row">
    <span class="eb">The offer</span>
    <span class="h">Step 1. The untangling call</span>
  </div>
  <div class="row">
    <span class="eb">How a sprint runs</span>
    <span class="h">Day 1 lock · Days 2 to 4 build · Day 5 handoff</span>
  </div>
</body>
</html>
