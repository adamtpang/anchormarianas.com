<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 24px 32px; box-sizing: border-box; }
  .head { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-soft); margin: 0 0 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-width: 460px; }
  label { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg); }
  input, textarea {
    font: 400 14px var(--font-sans);
    color: var(--fg);
    background: #fefbf5;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  input:focus, textarea:focus { border-color: #0e2d5c; box-shadow: 0 0 0 3px rgba(14,45,92,0.15); }
  input::placeholder, textarea::placeholder { color: var(--fg-faint); }
  .hint { font-family: var(--font-sans); font-size: 11.5px; color: var(--fg-soft); }
</style>
</head>
<body>
  <p class="head">Form inputs</p>
  <div class="field">
    <label>Email</label>
    <input type="email" placeholder="you@yourdomain.com" />
    <span class="hint">We reply by hand within a day.</span>
  </div>
  <div class="field">
    <label>The knot in plain words</label>
    <textarea rows="2" placeholder="The recurring loop you'd most like to quiet"></textarea>
  </div>
</body>
</html>
