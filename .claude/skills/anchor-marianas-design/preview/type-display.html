<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 26px 32px; box-sizing: border-box; }
  .specimen { font-family: var(--font-display); font-weight: 400; line-height: 1.0; letter-spacing: -0.015em; color: var(--fg); }
  .l1 { font-size: 64px; }
  .l2 { font-size: 64px; font-style: italic; color: var(--fg-soft); }
  .info { margin-top: 18px; display: flex; gap: 22px; align-items: center; }
  .info span { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-soft); }
  .info b { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-soft); }
</style>
</head>
<body>
  <div class="specimen l1">We sit, find the knot,</div>
  <div class="specimen l2">then ship the cure.</div>
  <div class="info">
    <b>Display · Instrument Serif</b>
    <span>400 · roman + italic</span>
    <span>letter-spacing −0.015em</span>
    <span>hero H1 only · never body</span>
  </div>
</body>
</html>
