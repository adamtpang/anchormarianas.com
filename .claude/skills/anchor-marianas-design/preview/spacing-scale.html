<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 26px 32px; box-sizing: border-box; }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #0e2d5c; border-radius: 3px; width: 26px; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-soft); text-align: center; line-height: 1.3; }
  .lbl b { display:block; color: var(--fg); font-family: var(--font-sans); font-size: 11px; font-weight: 500; }
  .head { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-soft); margin: 0 0 18px; }
</style>
</head>
<body>
  <p class="head">Spacing · 4px base · Tailwind-aligned</p>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px;"></div><div class="lbl"><b>1</b>4</div></div>
    <div class="step"><div class="bar" style="height:8px;"></div><div class="lbl"><b>2</b>8</div></div>
    <div class="step"><div class="bar" style="height:12px;"></div><div class="lbl"><b>3</b>12</div></div>
    <div class="step"><div class="bar" style="height:16px;"></div><div class="lbl"><b>4</b>16</div></div>
    <div class="step"><div class="bar" style="height:24px;"></div><div class="lbl"><b>6</b>24</div></div>
    <div class="step"><div class="bar" style="height:32px;"></div><div class="lbl"><b>8</b>32</div></div>
    <div class="step"><div class="bar" style="height:48px;"></div><div class="lbl"><b>12</b>48</div></div>
    <div class="step"><div class="bar" style="height:64px;"></div><div class="lbl"><b>16</b>64</div></div>
    <div class="step"><div class="bar" style="height:80px;"></div><div class="lbl"><b>20</b>80</div></div>
    <div class="step"><div class="bar" style="height:96px;"></div><div class="lbl"><b>24</b>96</div></div>
  </div>
</body>
</html>
