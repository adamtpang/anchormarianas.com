<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 0; box-sizing: border-box; }
  header {
    position: sticky; top: 0;
    border-bottom: 1px solid var(--border);
    background: rgba(251,246,238,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .bar { display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 0 28px; max-width: 1024px; margin: 0 auto; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { width: 22px; height: 22px; }
  .brand b { font: 400 19px var(--font-display); letter-spacing: -0.01em; }
  nav { display: flex; align-items: center; gap: 26px; font-size: 14px; }
  nav a { color: var(--fg-soft); text-decoration: none; }
  nav a.active { color: var(--fg); }
  .cta {
    background: var(--fg); color: var(--bg);
    padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600; text-decoration: none;
  }
  .meta { padding: 16px 28px; font-family: var(--font-sans); font-size: 12px; color: var(--fg-soft); max-width: 1024px; margin: 0 auto; }
  .meta b { color: var(--fg); }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand"><img src="../assets/logo-anchor.png" alt="" /><b>Anchor Marianas</b></div>
      <nav>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a class="cta" href="#">Book the call</a>
      </nav>
    </div>
  </header>
  <div class="meta">
    <b>Sticky header · 56px · max-w-5xl · blur 18px · 72% bg opacity</b>
  </div>
</body>
</html>
