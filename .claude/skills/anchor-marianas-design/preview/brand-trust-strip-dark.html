<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #060c19; }
  body { font-family: var(--font-sans); color: #f1f5f7; padding: 26px 32px; box-sizing: border-box; }
  .head { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #9bb1be; margin: 0 0 18px; }
  .strip {
    display: flex; gap: 36px; align-items: center; flex-wrap: wrap;
    padding: 22px 0;
    border-top: 1px solid #1d2a40; border-bottom: 1px solid #1d2a40;
  }
  .hilton { width: 66px; height: 66px; opacity: 0.92; }
  .partner { font-family: var(--font-display); font-size: 22px; letter-spacing: -0.005em; color: #9bb1be; opacity: 0.78; }
  .partner.bold { font-family: var(--font-sans); font-weight: 600; font-size: 16px; letter-spacing: 0.04em; text-transform: uppercase; color: #9bb1be; }
  .note { font-family: var(--font-sans); font-size: 12px; color: #9bb1be; margin-top: 14px; line-height: 1.55; max-width: 620px; }
</style>
</head>
<body>
  <p class="head">Trust strip · dark</p>
  <div class="strip">
    <img class="hilton" src="../assets/partners/hilton-guam.png" alt="Hilton Guam Resort & Spa" />
    <span class="partner">Network School</span>
    <span class="partner bold">IDI</span>
    <span class="partner">adapt.school</span>
  </div>
  <p class="note">Source PNG is white-on-transparent so it sits naturally on the abyssal bg. No filter applied.</p>
</body>
</html>
