<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf6ee; }
  body { font-family: var(--font-sans); color: var(--fg); padding: 26px 32px; box-sizing: border-box; }
  .head { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-soft); margin: 0 0 14px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .portrait {
    width: 84px; height: 84px; border-radius: 9999px;
    object-fit: cover; object-position: 30% 30%;
    border: 1px solid var(--border);
  }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta b { font-family: var(--font-display); font-size: 28px; font-weight: 400; letter-spacing: -0.01em; }
  .meta i { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--fg-soft); }
  .meta span { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-soft); }
</style>
</head>
<body>
  <p class="head">Founder · the operator</p>
  <div class="row">
    <img class="portrait" src="../assets/adam.jpg" alt="Adam Pangelinan" />
    <div class="meta">
      <b>Adam Tomas Pangelinan</b>
      <i>Founder, not the brand.</i>
      <span>operating from Guam · 11°22′N 142°35′E</span>
    </div>
  </div>
</body>
</html>
